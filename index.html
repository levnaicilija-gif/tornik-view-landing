  <script>
    const form = document.getElementById('signupForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('signupBtn');
    const message = document.getElementById('signupMessage');

    function showMessage(text, isError) {
      message.textContent = text;
      message.style.color = isError ? '#E8B96A' : '#D4A857';
      message.classList.add('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showMessage('Please enter a valid email address.', true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        // Store email locally as fallback (Vercel form / Formspree integration later)
        const subscribers = JSON.parse(localStorage.getItem('tv_subscribers') || '[]');
        if (!subscribers.includes(email)) {
          subscribers.push(email);
          localStorage.setItem('tv_subscribers', JSON.stringify(subscribers));
        }

        // Try to send via Formspree (replace YOUR_FORM_ID with actual after setup)
        // const response = await fetch('https://formspree.io/f/YOUR_FORM_ID', {
        //   method: 'POST',
        //   headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        //   body: JSON.stringify({ email })
        // });

        setTimeout(() => {
          showMessage('Thank you. We will be in touch when we open.', false);
          emailInput.value = '';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Notify me';
        }, 800);

      } catch (err) {
        showMessage('Something went wrong. Please try again.', true);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Notify me';
      }
    });
  </script>
